name: Verify

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Required verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for E2E
        run: npx playwright install --with-deps chromium

      - name: Run required verification
        run: npm run verify
